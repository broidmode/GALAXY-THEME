# GALAXY Theme metrics
# Designed for Project OutFox — 1080p design base (scales to 1440p/2160p)
# Targets DDR A3 / DDR WORLD feature set

[Global]
FallbackTheme=_fallback

[Common]
InitialScreen="ScreenClear"
FirstAttractScreen="ScreenWarning"
DefaultNoteSkinName="default"

# Design resolution: 1080p base. The engine auto-scales to the user's
# actual display (1440p, 2160p, etc). All coordinate math in
# BGAnimations should assume a 1920x1080 canvas.
ScreenWidth=1
ScreenHeight=1080
AutoSetStyle=false
ImageCache="Banner,Background,Jacket"

# -----------------------------------------------------------------------
# Boot sequence: Clear -> Warning -> Logo -> Title
# -----------------------------------------------------------------------

[ScreenClear]
Class="ScreenAttract"
Fallback="ScreenAttract"
NextScreen="ScreenWarning"
PrevScreen="ScreenTitleMenu"
ForceTimer=true
TimerStealth=true
HeaderText=
TimerSeconds=1
TimerOnCommand=zoom,0

[ScreenWarning]
Class="ScreenAttract"
Fallback="ScreenAttract"
NextScreen="ScreenLogo"
PrevScreen="ScreenTitleMenu"
TimerSeconds=5
PlayMusic=false

[ScreenLogo]
Class="ScreenAttract"
Fallback="ScreenAttract"
NextScreen="ScreenTitleMenu"
PrevScreen="ScreenTitleMenu"
TimerSeconds=8
PlayMusic=false

# -----------------------------------------------------------------------
# Title Menu
# -----------------------------------------------------------------------

[ScreenTitleMenu]
ShowHeader=false
ShowFooter=false
PlayMusic=false
#
ChoiceNames="GameStart,Options,Exit"
DefaultChoice="GameStart"
ChoiceGameStart="applydefaultoptions;text,GAME START;screen,"..Branch.AfterTitleMenu()
ChoiceOptions="text,OPTIONS;screen,ScreenOptionsService"
ChoiceExit="screen,ScreenExit;text,EXIT"
#
ShowScroller=true
ScrollerX=SCREEN_CENTER_X
ScrollerY=SCREEN_CENTER_Y+60
ScrollerTransform=function(self,offset,itemIndex,numItems) self:y(SCREEN_CENTER_Y+60+63*(itemIndex-(numItems-1)/2)); end;
ScrollerSecondsPerItem=0.15
ScrollerNumItemsToDraw=10

# -----------------------------------------------------------------------
# Music Select
# -----------------------------------------------------------------------

[ScreenSelectMusic]

# -----------------------------------------------------------------------
# Gameplay
# -----------------------------------------------------------------------

[ScreenGameplay]

# -----------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------

[ScreenEvaluation]
