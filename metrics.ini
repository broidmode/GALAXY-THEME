# GALAXY Theme metrics
# Designed for ITGmania — 1080p design base
# Inherits almost everything from _fallback

[Global]
FallbackTheme=_fallback

[Common]
ScreenWidth=1
ScreenHeight=1080
AutoSetStyle=false
ImageCache="Banner,Background,Jacket"
InitialScreen="ScreenTitleMenu"

# -----------------------------------------------------------------------
# Kill the inherited MenuTimer on every ScreenWithMenuElements screen.
# The _fallback metrics.ini sets TimerX= and TimerY= (empty), which
# resolves to (0,0)—placing the countdown text in the top-left corner.
# GALAXY manages its own UI so the engine timer is not needed.
# -----------------------------------------------------------------------

[ScreenWithMenuElements]
TimerSeconds=-1

# -----------------------------------------------------------------------
# Title Menu — 3 choices: Play, Options, Exit
# -----------------------------------------------------------------------

[ScreenTitleMenu]
PlayMusic=false
ChoiceNames="GameStart,ThemeOptions,Options,Exit"
DefaultChoice="GameStart"
ChoiceGameStart="applydefaultoptions;text,Play;screen,"..Branch.AfterTitleMenu()
ChoiceThemeOptions="screen,ScreenThemeOptions;text,Customize"
ChoiceOptions="screen,ScreenOptionsService;text,Legacy Options"
ChoiceExit="screen,ScreenExit;text,Exit"
ScrollerTransform=function(self,offset,itemIndex,numItems) self:y(48*(itemIndex-(numItems-1)/2)); end

# -----------------------------------------------------------------------
# Theme Options — GALAXY-specific settings (Japanese Sorting, etc.)
# Inherits ScreenOptionsServiceChild layout; routes back to title menu.
# -----------------------------------------------------------------------

[ScreenThemeOptions]
Fallback="ScreenOptionsServiceChild"
NextScreen="ScreenTitleMenu"
PrevScreen="ScreenTitleMenu"
LineNames="JapaneseSorting,JacketQuality"
LineJapaneseSorting="lua,ThemePrefRow('JapaneseSorting')"
LineJacketQuality="lua,ThemePrefRow('JacketQuality')"

# Route back from options to title
[ScreenOptionsService]
PrevScreen=Branch.TitleMenu()
NextScreen=Branch.TitleMenu()

# -----------------------------------------------------------------------
# Profile Select — LockInputSecs required by engine's ScreenSelectProfile
# -----------------------------------------------------------------------

[ScreenSelectProfile]
LockInputSecs=0

# -----------------------------------------------------------------------
# Style Select — same visual treatment as title menu
# -----------------------------------------------------------------------

[ScreenSelectStyle]
ChoiceNames="Single,Double"
ScrollerTransform=function(self,offset,itemIndex,numItems) self:y(48*(itemIndex-(numItems-1)/2)); end
PlayMusic=false

# -----------------------------------------------------------------------
# Music Select — custom 3-column grid (no MusicWheel)
# Uses ScreenWithMenuElements as a blank canvas.
# All song browsing is handled in Lua overlay.
# -----------------------------------------------------------------------

[ScreenGalaxyMusic]
Fallback="ScreenWithMenuElements"
PlayMusic=false
NextScreen="ScreenStageInformation"
PrevScreen=Branch.AfterTitleMenu()

# -----------------------------------------------------------------------
# Gameplay — DDR WORLD scoring & gauge, all HUD elements theme-controlled
# Engine life bar neutralized (all LifePercentChange = 0).
# Fail handled in Lua via PostScreenMessage("SM_BeginFailed").
# -----------------------------------------------------------------------

[Gameplay]
UseInternalScoring=false
UseInternalJudgment=false
ComboIsPerRow=true
MinScoreToContinueCombo='TapNoteScore_W4'
MinScoreToMaintainCombo='TapNoteScore_W4'
MineHitIncrementsMissCombo=true
AvoidMineIncrementsCombo=true

[Combo]
ShowComboAt=4

[ScreenGameplay]
StartGivesUp=false
AllowCenter1Player=true
ShowScore=false
ShowStageDisplay=false
ShowScoreFrame=false
# Hide the engine's built-in LifeMeterBar — our Lua gauge replaces it
LifeP1OnCommand=visible,false
LifeP2OnCommand=visible,false

# -----------------------------------------------------------------------
# NoteField — beat bars disabled by default; enabled at runtime by Lua
# when guideline option is Center or Border.
# -----------------------------------------------------------------------

[NoteField]
ShowBeatBars=false
ShowBPMBars=false
ShowStopBars=false
BarMeasureAlpha=1
Bar4thAlpha=0.25
Bar8thAlpha=0
Bar16thAlpha=0

# Hold judgments: use empty commands (GALAXY replaces with theme HUD later)
[HoldJudgment]
HoldJudgmentLetGoCommand=
HoldJudgmentHeldCommand=
HoldJudgmentMissedHoldCommand=

# Player settings — DDR-compatible hold behavior
[Player]
ComboBreakOnImmediateHoldLetGo=true
# Receptor position (DDR-A3/DDR-WORLD values; NoteField coordinates)
ReceptorArrowsYStandard=-161
ReceptorArrowsYReverse=156
HoldJudgmentYStandard=-112
HoldJudgmentYReverse=100
# Draw distance in NoteField coords (480p).  The Player actor is zoomed by
# ScreenHeight/480 = 2.25, so 480 NF px = 1080 screen px (full screen height)
# and -57 NF px ≈ -128 screen px (matches _fallback's intended after-target
# distance).  Without this override, the inherited SCREEN_HEIGHT=1080 is
# interpreted as 1080 NF px → 2430 screen px, causing hold bodies & tails
# to render far too long past the receptor.
DrawDistanceBeforeTargetsPixels=480
DrawDistanceAfterTargetsPixels=-57
# Draw judgments behind/in front of notes based on JudgePriority option.
# Same pattern as DDR-A3: TapJudgmentsUnderField=ComboUnderField()
TapJudgmentsUnderField=IsJudgmentUnderField()
HoldJudgmentsUnderField=IsJudgmentUnderField()
ComboUnderField=IsComboUnderField()

# Neutralize engine life bar — GALAXY controls life entirely in Lua
[LifeMeterBar]
LifePercentChangeW1=0
LifePercentChangeW2=0
LifePercentChangeW3=0
LifePercentChangeW4=0
LifePercentChangeW5=0
LifePercentChangeMiss=0
LifePercentChangeHitMine=0
LifePercentChangeHeld=0
LifePercentChangeLetGo=0
LifePercentChangeMissedHold=0
LifePercentChangeCheckpointHit=0
LifePercentChangeCheckpointMiss=0
# Start full so any engine code that reads life sees a healthy value.
# (GALAXY never changes engine life — Lua gauge is the real life bar.)
InitialValue=1.0

# 17-tier DDR grading (engine fallback — Lua grading is primary)
[PlayerStageStats]
NumGradeTiersUsed=17
GradeTier01IsAllW2s=false
GradeTier02IsAllW2s=false
GradePercentTier01=1.000000
GradePercentTier02=0.990000
GradePercentTier03=0.950000
GradePercentTier04=0.900000
GradePercentTier05=0.890000
GradePercentTier06=0.850000
GradePercentTier07=0.800000
GradePercentTier08=0.790000
GradePercentTier09=0.750000
GradePercentTier10=0.700000
GradePercentTier11=0.690000
GradePercentTier12=0.650000
GradePercentTier13=0.600000
GradePercentTier14=0.590000
GradePercentTier15=0.550000
GradePercentTier16=0.000000
GradePercentTier17=-99999.000000
