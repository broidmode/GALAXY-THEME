[ScreenThemeOptions]
HeaderText=Theme Options
HelpText=Set theme-specific options.

[OptionTitles]
JapaneseSorting=Title Sort Order
JacketQuality=Jacket Art
ProfileSortOrder=Profile Sort Order
ProfileSortOrderAscending=Sort Ascending

[OptionExplanations]
JapaneseSorting=Sort order for song titles. L = Latin, J = Japanese, N = Numbers/Symbols. Pick the grouping order, or Romaji for flat alphabetical.
JacketQuality=Low: fast thumbnails from cache. Incremental: high-res, load as needed. Unlimited: high-res, load with no limit on cache.
ProfileSortOrder=How profiles are sorted on the select screen: by name, last played, or number of plays.
ProfileSortOrderAscending=Whether profiles sort A-Z / oldest-first (On) or Z-A / newest-first (Off).

